services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./instance:/app/instance
      - ./content:/app/content
    env_file:
      - .env
    environment:
      - SQLALCHEMY_DATABASE_URI=sqlite:////app/instance/albricias.db
      - API_TOKEN=${API_TOKEN:-dev-token}
    restart: unless-stopped

volumes:
  instance:
  content:
