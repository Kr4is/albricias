{# Preview toolbar — included at the bottom of issue_v*.html when is_preview=True #}
{% if is_preview %}
<div class="fixed bottom-0 left-0 right-0 z-50 bg-ink text-paper no-print">
    <div class="max-w-[1400px] mx-auto px-4 py-3 flex items-center justify-between gap-4 flex-wrap">
        <div class="flex items-center gap-2">
            <span class="material-icons text-amber-400 text-sm">visibility</span>
            <span class="text-xs font-sans font-bold uppercase tracking-widest text-amber-400">Preview Mode</span>
            <span class="text-xs font-sans text-stone-400 ml-2">— {{ issue.title }}</span>
        </div>
        <div class="flex items-center gap-3 flex-wrap">
            <a href="{{ url_for('admin.edition_edit', edition_id=issue.id) }}"
               class="inline-flex items-center gap-1.5 px-4 py-2 text-xs font-bold font-sans uppercase tracking-widest border border-stone-500 text-stone-300 hover:border-paper hover:text-paper transition-colors">
                <span class="material-icons text-sm">edit</span> Edit Articles
            </a>
            {% if issue.status == 'draft' %}
            <form method="POST" action="{{ url_for('admin.edition_publish', edition_id=issue.id) }}">
                <button type="submit"
                        class="inline-flex items-center gap-1.5 px-4 py-2 text-xs font-bold font-sans uppercase tracking-widest bg-amber-500 text-ink hover:bg-amber-400 transition-colors">
                    <span class="material-icons text-sm">publish</span> Publish Edition
                </button>
            </form>
            {% else %}
            <a href="{{ url_for('public.edition_detail', edition_id=issue.id) }}"
               class="inline-flex items-center gap-1.5 px-4 py-2 text-xs font-bold font-sans uppercase tracking-widest bg-green-600 text-white hover:bg-green-500 transition-colors">
                <span class="material-icons text-sm">open_in_new</span> View Live
            </a>
            {% endif %}
            <a href="{{ url_for('admin.editions') }}"
               class="inline-flex items-center gap-1.5 px-4 py-2 text-xs font-bold font-sans uppercase tracking-widest text-stone-400 hover:text-paper transition-colors">
                <span class="material-icons text-sm">arrow_back</span> Dashboard
            </a>
        </div>
    </div>
</div>
<!-- Spacer so content isn't hidden behind the toolbar -->
<div class="h-16 no-print"></div>
{% endif %}
