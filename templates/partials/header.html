<header class="flex flex-col px-6 sm:px-8 lg:px-10 pt-4 print:px-0">
    <!-- Top Meta Bar -->
    <div
        class="grid grid-cols-1 md:grid-cols-3 items-center py-2 border-b border-ink border-double text-[10px] sm:text-xs font-sans font-bold uppercase tracking-widest gap-y-2 md:gap-y-0">
        <div class="text-center md:text-left order-2 md:order-1">
            <span>Vol. CLXXIII . . No. 60,124</span>
        </div>
        <div class="text-center order-1 md:order-2">
            <span>New York, Tuesday, October 24, 2023</span>
        </div>
        <div class="flex justify-center md:justify-end gap-6 no-print order-3">
            <a href="{{ url_for('home') }}"
                class="hover:underline decoration-2 underline-offset-4 {{ 'underline' if request.endpoint == 'home' else '' }}">Current
                Issue</a>
            <a href="{{ url_for('archive') }}"
                class="hover:underline decoration-2 underline-offset-4 {{ 'underline' if request.endpoint == 'archive' else '' }}">Archive</a>
        </div>
    </div>

    <!-- Masthead -->
    <div class="text-center py-6 sm:py-8 lg:py-10">
        <a href="{{ url_for('home') }}" class="inline-block">
            <h1
                class="font-masthead text-6xl md:text-8xl lg:text-[7.5rem] leading-none text-ink drop-shadow-sm tracking-tight hover:opacity-90 transition-opacity">
                ¡Albricias!
            </h1>
        </a>
    </div>

    <!-- Sub-header Bar -->
    <div class="border-t border-b border-ink py-1.5 mb-1">
        <div
            class="grid grid-cols-3 items-center text-[9px] sm:text-[10px] font-sans font-bold uppercase tracking-wider">
            <div class="text-left italic font-serif normal-case font-normal text-stone-600">
                "All the News That's Fit to Print"
            </div>
            <div class="text-center">
                Late City Edition
            </div>
            <div class="text-right">
                Weather: Rainy, High 56.
            </div>
        </div>
    </div>
    <div class="border-b-2 border-ink mb-6"></div>
</header>
